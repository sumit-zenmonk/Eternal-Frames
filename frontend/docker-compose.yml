name: "eternal-frame-frontend"

services:
  frontend:
    build:
      context: ./
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    env_file: ./.env
    networks:
      - eternal_frame_network

networks:
  eternal_frame_network: # backend should start first to create this network
    name: eternal-frame-backend_eternal_frame_network
    external: true